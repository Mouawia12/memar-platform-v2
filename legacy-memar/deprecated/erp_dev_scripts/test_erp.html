<!DOCTYPE html>
<html>
<head>
<title>ERP JS Test</title>
</head>
<body>
<h1 id="status">Loading...</h1>
<pre id="log" style="font-size:12px;background:#f5f5f5;padding:10px;max-height:400px;overflow:auto;direction:ltr"></pre>

<script>
// Capture all errors
var errors = [];
window.addEventListener('error', function(e) {
  errors.push('ERROR: ' + e.message + ' at line ' + e.lineno + ' col ' + e.colno + ' in ' + e.filename);
  document.getElementById('log').textContent += '\n' + errors[errors.length-1];
});

// Mock required globals
window.Chart = function(ctx, config) { return { update: function(){}, data: config.data, options: config.options }; };
window.Sortable = { create: function() { return {}; } };

// After scripts load, check state
function checkStatus() {
  var status = [];
  status.push('DATA: ' + typeof DATA);
  status.push('ERP: ' + typeof ERP);
  status.push('MemarDB: ' + typeof MemarDB);
  status.push('supabase: ' + typeof supabase);
  
  if (typeof DATA !== 'undefined') {
    status.push('DATA.projects: ' + (DATA.projects ? DATA.projects.length : 'N/A'));
    status.push('DATA.user: ' + JSON.stringify(DATA.user));
  }
  
  if (errors.length > 0) {
    status.push('ERRORS: ' + errors.join('; '));
  }
  
  var statusText = status.join('\n');
  document.getElementById('status').textContent = typeof DATA !== 'undefined' ? '✅ DATA loaded!' : '❌ DATA undefined';
  document.getElementById('log').textContent = statusText;
  console.log('STATUS CHECK:\n' + statusText);
}
</script>

<script src="../shared/supabase.min.js"></script>
<script src="../shared/supabase-client.js"></script>
<script src="erp_app.js"></script>

<script>
// Check after all scripts loaded
window.addEventListener('load', function() {
  setTimeout(checkStatus, 500);
});
document.addEventListener('DOMContentLoaded', function() {
  setTimeout(checkStatus, 1000);
});
</script>

</body>
</html>
