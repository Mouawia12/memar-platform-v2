<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بوابة العملاء — مجموعة معمار للاستشارات الهندسية</title>
<script>
window.onerror = function(msg, url, line, col, error) {
  const div = document.createElement('div');
  div.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:99999;background:red;color:white;padding:20px;direction:ltr;text-align:left;font-family:monospace;white-space:pre-wrap;box-shadow:0 10px 30px rgba(0,0,0,.5)';
  div.textContent = 'Runtime Error in ' + url + '\nMessage: ' + msg + '\nLine: ' + line + '\nStack: ' + (error ? error.stack : '');
  if (!document.body) { window.onload = () => document.body.appendChild(div); } else { document.body.appendChild(div); }
};
</script>
<meta name="description" content="بوابة العملاء لمتابعة مشاريعكم مع مجموعة معمار">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared/memar-ds.css">
<style>
/* ═══════════════════════════════════════════════════
   MEMAR CLIENT PORTAL — Design System (Brand Aligned)
   ═══════════════════════════════════════════════════ */
:root {
  /* ── Primary (Memar Blue) ── */
  --primary:       #1B6CA8;
  --primary-dark:  #0D4A7A;
  --primary-light: #155D94;
  --primary-50:    #E6F1FB;
  --primary-100:   #BDDDF5;

  /* ── Status Colors ── */
  --success:       #2D9B6F;
  --success-50:    #E1F5EE;
  --warning:       #E8A838;
  --warning-50:    #FFF3DB;
  --danger:        #DC4A3D;
  --danger-50:     #FDE8E8;
  --info:          #1B6CA8;
  --info-50:       #E6F1FB;

  /* ── Neutrals ── */
  --bg:            #F7F8FA;
  --bg-card:       #FFFFFF;
  --text:          #1A1F2E;
  --text-2:        #2D3748;
  --text-3:        #5A6478;
  --text-4:        #94A3B8;
  --border:        #E4E8EF;
  --divider:       #F1F5F9;

  /* ── Shadows ── */
  --sh-sm:  0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
  --sh-md:  0 4px 12px rgba(0,0,0,.07), 0 2px 4px rgba(0,0,0,.04);
  --sh-lg:  0 8px 24px rgba(27,108,168,.12), 0 2px 4px rgba(0,0,0,.04);
  --sh-xl:  0 20px 40px rgba(0,0,0,.12), 0 8px 16px rgba(0,0,0,.06);

  /* ── Layout ── */
  --sidebar-w: 240px;
  --topbar-h:  60px;
  --r:    12px;
  --r-sm: 8px;
  --r-lg: 16px;
  --tr:   .18s ease;
}

*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
html { font-size:14px; scroll-behavior:smooth; }
body { font-family:'Cairo', sans-serif; background:var(--bg); color:var(--text); min-height:100vh; -webkit-font-smoothing:antialiased; }
a { text-decoration:none; color:inherit; }
button { cursor:pointer; border:none; background:none; font-family:inherit; }
input,select,textarea { font-family:inherit; }
ul { list-style:none; }
img { display:block; max-width:100%; }
.hidden { display:none !important; }

/* ── App Shell ── */
.app { display:flex; min-height:100vh; }

/* ── Sidebar ── */
.sidebar {
  width:var(--sidebar-w); background:#fff;
  border-left:1px solid var(--border);
  display:flex; flex-direction:column;
  position:fixed; top:0; right:0; bottom:0;
  z-index:200; overflow-y:auto;
  box-shadow:var(--sh-sm);
  transition:transform var(--tr);
}
@media(max-width:900px){ .sidebar{transform:translateX(100%);} .sidebar.open{transform:none;} }

.sb-brand {
  padding:18px 16px 14px;
  border-bottom:1px solid var(--divider);
  display:flex; align-items:center; gap:10px;
}
.sb-brand-icon {
  width:38px; height:38px; border-radius:10px;
  background:linear-gradient(135deg,var(--primary),var(--primary-light));
  display:flex; align-items:center; justify-content:center;
  color:#fff; font-size:17px; font-weight:800; flex-shrink:0;
}
.sb-brand h1 { font-size:14px; font-weight:800; line-height:1; }
.sb-brand span { font-size:10.5px; color:var(--text-3); }
.sb-portal-tag {
  margin:10px 12px 4px;
  background:var(--primary-50); color:var(--primary);
  border-radius:6px; padding:4px 10px;
  font-size:11px; font-weight:700; text-align:center;
  border:1px solid var(--primary-100);
}
.sb-nav { padding:4px 0; }
.sb-label {
  padding:10px 16px 4px; font-size:10px; font-weight:700;
  color:var(--text-4); text-transform:uppercase; letter-spacing:.06em;
}
.nav-item {
  display:flex; align-items:center; gap:10px;
  padding:9px 14px; margin:1px 8px; border-radius:var(--r-sm);
  color:var(--text-3); font-size:13px; font-weight:500;
  cursor:pointer; transition:all var(--tr); position:relative;
}
.nav-item:hover { background:var(--primary-50); color:var(--primary); }
.nav-item.active { background:var(--primary-50); color:var(--primary); font-weight:700; }
.nav-item.active::before {
  content:''; position:absolute;
  left:0; top:20%; bottom:20%; width:3px;
  background:var(--primary); border-radius:0 3px 3px 0;
}
.nav-icon { font-size:16px; width:20px; text-align:center; flex-shrink:0; }
.nav-badge {
  margin-right:auto; background:var(--danger);
  color:#fff; border-radius:20px;
  padding:1px 7px; font-size:10px; font-weight:700;
}
.nav-dot {
  width:7px; height:7px; border-radius:50%;
  background:var(--danger); margin-right:auto;
}
.sb-user {
  margin-top:auto; padding:12px 14px;
  border-top:1px solid var(--divider);
  display:flex; align-items:center; gap:10px;
}
.sb-avatar {
  width:34px; height:34px; border-radius:50%;
  background:linear-gradient(135deg,#7C3AED,#A78BFA);
  display:flex; align-items:center; justify-content:center;
  color:#fff; font-size:13px; font-weight:700; flex-shrink:0;
}
.sb-user-info strong { display:block; font-size:12.5px; font-weight:700; }
.sb-user-info span { font-size:11px; color:var(--text-3); }

/* ── Main ── */
.main { flex:1; margin-right:var(--sidebar-w); display:flex; flex-direction:column; }
@media(max-width:900px){ .main{margin-right:0;} }

/* ── Topbar ── */
.topbar {
  height:var(--topbar-h); background:#fff;
  border-bottom:1px solid var(--border);
  display:flex; align-items:center; gap:12px;
  padding:0 22px; position:sticky; top:0; z-index:100;
  box-shadow:var(--sh-sm);
}
.topbar-toggle { font-size:18px; color:var(--text-3); padding:6px 8px; border-radius:6px; display:none; }
@media(max-width:900px){ .topbar-toggle{display:flex;} }
.topbar-page-title { font-size:15px; font-weight:700; color:var(--text); }
.topbar-actions { margin-right:auto; display:flex; align-items:center; gap:8px; }
.icon-btn { width:34px; height:34px; border-radius:8px; display:flex; align-items:center; justify-content:center; color:var(--text-3); font-size:16px; position:relative; transition:all var(--tr); }
.icon-btn:hover { background:var(--divider); color:var(--text); }
.notif-bubble { position:absolute; top:4px; right:4px; width:8px; height:8px; background:var(--danger); border-radius:50%; border:2px solid #fff; }

/* ── Content ── */
.content { flex:1; padding:22px; overflow-y:auto; }
.page { display:none; animation:fadeIn .2s ease; }
.page.active { display:block; }
@keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }

/* ── Cards ── */
.card { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--r); box-shadow:var(--sh-sm); }
.card-header { display:flex;align-items:center;justify-content:space-between; padding:14px 18px 0; }
.card-title { font-size:13.5px; font-weight:800; color:var(--text); }
.card-subtitle { font-size:11.5px; color:var(--text-3); margin-top:2px; }
.card-body { padding:14px 18px; }

/* ── KPI Cards ── */
.kpi-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:12px; }
.kpi-card { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--r); padding:16px 18px; box-shadow:var(--sh-sm); display:flex; align-items:flex-start; gap:12px; }
.kpi-icon { width:42px; height:42px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:19px; flex-shrink:0; }
.kpi-icon.blue   { background:var(--primary-50); color:var(--primary); }
.kpi-icon.green  { background:var(--success-50); color:var(--success); }
.kpi-icon.orange { background:var(--warning-50); color:var(--warning); }
.kpi-icon.red    { background:var(--danger-50);  color:var(--danger); }
.kpi-icon.purple { background:var(--purple-50);  color:var(--purple); }
.kpi-icon.teal   { background:var(--teal-50);    color:var(--teal); }
.kpi-label { font-size:11.5px; color:var(--text-3); margin-bottom:3px; }
.kpi-value { font-size:22px; font-weight:800; color:var(--text); line-height:1; }
.kpi-sub { font-size:11px; color:var(--text-3); margin-top:3px; }

/* ── Badges ── */
.badge { display:inline-flex; align-items:center; gap:4px; padding:3px 9px; border-radius:20px; font-size:11.5px; font-weight:600; white-space:nowrap; }
.badge::before { content:'●'; font-size:7px; }
.badge-blue   { background:var(--primary-50); color:var(--primary); }
.badge-green  { background:var(--success-50); color:var(--success); }
.badge-orange { background:var(--warning-50); color:var(--warning); }
.badge-red    { background:var(--danger-50);  color:var(--danger); }
.badge-gray   { background:var(--divider);    color:var(--text-3); }
.badge-purple { background:var(--purple-50);  color:var(--purple); }

/* ── Buttons ── */
.btn { display:inline-flex; align-items:center; gap:6px; padding:8px 16px; border-radius:var(--r-sm); font-size:13px; font-weight:600; cursor:pointer; border:none; transition:all var(--tr); white-space:nowrap; font-family:inherit; }
.btn-primary   { background:var(--primary); color:#fff; }
.btn-primary:hover { background:var(--primary-dark); box-shadow:0 4px 12px rgba(79,70,229,.3); }
.btn-success   { background:var(--success); color:#fff; }
.btn-danger    { background:var(--danger);  color:#fff; }
.btn-secondary { background:var(--divider); color:var(--text-2); }
.btn-secondary:hover { background:var(--border); }
.btn-ghost     { background:transparent; color:var(--primary); border:1px solid var(--primary-100); }
.btn-ghost:hover { background:var(--primary-50); }
.btn-sm        { padding:5px 11px; font-size:12px; }
.btn-teal      { background:var(--teal); color:#fff; }

/* ── Forms ── */
.form-group { margin-bottom:14px; }
.form-label { display:block; font-size:12.5px; font-weight:700; color:var(--text-2); margin-bottom:5px; }
.form-input { width:100%; border:1px solid var(--border); border-radius:var(--r-sm); padding:8px 12px; font-size:13px; font-family:inherit; color:var(--text); background:var(--bg-card); transition:border-color var(--tr); outline:none; }
.form-input:focus { border-color:var(--primary); box-shadow:0 0 0 3px rgba(79,70,229,.1); }
.form-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }

/* ── Tables ── */
.table-wrap { overflow-x:auto; }
table { width:100%; border-collapse:collapse; font-size:13px; }
th { background:var(--bg); color:var(--text-3); font-weight:700; font-size:11px; text-transform:uppercase; letter-spacing:.04em; padding:10px 14px; border-bottom:1px solid var(--border); text-align:right; white-space:nowrap; }
td { padding:10px 14px; border-bottom:1px solid var(--divider); color:var(--text-2); vertical-align:middle; }
tr:last-child td { border:none; }
tr:hover td { background:var(--bg); }

/* ── Progress ── */
.progress-bar { height:6px; background:var(--divider); border-radius:3px; overflow:hidden; }
.progress-fill { height:100%; border-radius:3px; transition:width .5s ease; }
.progress-fill.blue   { background:var(--primary); }
.progress-fill.green  { background:var(--success); }
.progress-fill.orange { background:var(--warning); }

/* ── Section Header ── */
.section-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
.section-title  { font-size:14px; font-weight:800; color:var(--text); }
.section-sub    { font-size:12px; color:var(--text-3); margin-top:2px; }

/* ── Modal ── */
.modal-backdrop { position:fixed; inset:0; background:rgba(15,23,42,.45); backdrop-filter:blur(4px); z-index:500; display:none; align-items:flex-start; justify-content:center; padding-top:50px; }
.modal-backdrop.open { display:flex; }
.modal { background:var(--bg-card); border-radius:var(--r-lg); box-shadow:var(--sh-xl); width:540px; max-width:95vw; animation:modalIn .22s ease; max-height:88vh; overflow-y:auto; }
@keyframes modalIn { from{opacity:0;transform:scale(.96) translateY(-10px)} to{opacity:1;transform:none} }
.modal-header { display:flex; align-items:center; justify-content:space-between; padding:16px 20px; border-bottom:1px solid var(--divider); }
.modal-title { font-size:15px; font-weight:800; }
.modal-close { width:28px; height:28px; border-radius:6px; display:flex; align-items:center; justify-content:center; font-size:17px; color:var(--text-3); }
.modal-close:hover { background:var(--danger-50); color:var(--danger); }
.modal-body { padding:20px; }
.modal-footer { padding:14px 20px; border-top:1px solid var(--divider); display:flex; gap:8px; justify-content:flex-end; }

/* ── Scrollbar ── */
::-webkit-scrollbar { width:5px; height:5px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px; }

/* ── Toast ── */
.toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(20px); background:#1E293B; color:#fff; padding:10px 24px; border-radius:24px; font-size:13px; font-weight:600; z-index:999; opacity:0; transition:all .3s; pointer-events:none; box-shadow:0 8px 20px rgba(0,0,0,.25); white-space:nowrap; }
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

/* ════════════════════════════════════════
   PROJECT TIMELINE
   ════════════════════════════════════════ */
.project-hero {
  background:linear-gradient(135deg,var(--primary) 0%,#7C3AED 100%);
  border-radius:var(--r-lg); padding:24px 28px;
  color:#fff; margin-bottom:20px; position:relative; overflow:hidden;
}
.project-hero::before {
  content:''; position:absolute; inset:0;
  background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
}
.ph-num { font-size:11.5px; opacity:.7; margin-bottom:4px; font-family:'Inter'; }
.ph-name { font-size:22px; font-weight:800; margin-bottom:6px; }
.ph-type { font-size:13px; opacity:.8; margin-bottom:16px; }
.ph-meta { display:flex; gap:24px; flex-wrap:wrap; }
.ph-meta-item { }
.ph-meta-label { font-size:10.5px; opacity:.7; }
.ph-meta-value { font-size:14px; font-weight:700; }
.ph-progress-wrap { margin-top:14px; }
.ph-progress-label { display:flex; justify-content:space-between; font-size:12px; opacity:.8; margin-bottom:6px; }
.ph-progress-bar { height:8px; background:rgba(255,255,255,.25); border-radius:4px; overflow:hidden; }
.ph-progress-fill { height:100%; background:#fff; border-radius:4px; transition:width .6s ease; }

/* Stage Timeline */
.stage-timeline { position:relative; margin:20px 0; }
.stage-line { position:absolute; top:20px; right:30px; left:30px; height:2px; background:var(--border); z-index:0; }
.stages-row { display:flex; position:relative; z-index:1; gap:0; }
.stage-item { flex:1; display:flex; flex-direction:column; align-items:center; cursor:pointer; }
.stage-circle {
  width:40px; height:40px; border-radius:50%;
  border:2px solid var(--border); background:#fff;
  display:flex; align-items:center; justify-content:center;
  font-size:14px; margin-bottom:8px; transition:all .2s;
  position:relative; z-index:2;
}
.stage-item.done .stage-circle   { background:var(--success); border-color:var(--success); color:#fff; }
.stage-item.active .stage-circle { background:var(--primary); border-color:var(--primary); color:#fff; box-shadow:0 0 0 4px var(--primary-100); }
.stage-item.pending .stage-circle { background:#fff; color:var(--text-4); }
.stage-item.blocked .stage-circle { background:var(--danger-50); border-color:var(--danger); color:var(--danger); }
.stage-label { font-size:11px; text-align:center; line-height:1.3; font-weight:600; color:var(--text-3); padding:0 4px; }
.stage-item.done .stage-label   { color:var(--success); }
.stage-item.active .stage-label { color:var(--primary); font-weight:700; }
.stage-date { font-size:10px; color:var(--text-4); text-align:center; margin-top:2px; font-family:'Inter'; }

/* Dynamic 3-Column Stage Layout */
.layout-stages {
  display: grid;
  grid-template-columns: 250px 1fr 250px;
  gap: 20px;
  margin: 20px 0;
  align-items: flex-start;
}

/* Smart Progress KPIs */
.kpi-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 24px; }
.kpi-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--r); padding: 16px; display: flex; flex-direction: column; gap: 6px; box-shadow: var(--sh-sm); }
.kpi-val { font-size: 24px; font-weight: 800; color: var(--text); }
.kpi-label { font-size: 12.5px; color: var(--text-3); font-weight: 600; }

.timeline-progress-wrap { position: relative; height: 10px; background: var(--bg); border-radius: 5px; overflow: hidden; margin-bottom: 24px; display: flex; width: 100%; box-shadow: inset 0 1px 3px rgba(0,0,0,0.05); }

/* Base Stage Card */
.stg-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  padding: 16px;
  box-shadow: var(--sh-sm);
  transition: all 0.3s ease;
  display: flex;
  flex-direction: column;
}

/* 1) Archived (Right Column - Grid area 1 in RTL) */
.stg-archived { opacity: 0.65; filter: grayscale(30%); border-bottom: 3px solid var(--success); }
.stg-archived:hover { opacity: 0.95; filter: none; box-shadow: var(--sh-md); }

/* 2) Active (Center Column) */
.stg-active {
  border: 2px solid var(--primary);
  box-shadow: var(--sh-lg);
  transform: scale(1.03);
  padding: 24px;
  z-index: 10;
}

/* 3) Upcoming (Left Column) */
.stg-upcoming {
  opacity: 0.45;
  background: var(--bg);
  border: 2px dashed var(--border);
  transition: opacity 0.3s ease;
}
.stg-upcoming:hover { opacity: 0.8; border-style: solid; }

/* 4) Delayed (Warning Active state) */
.stg-delayed {
  border: 2px solid var(--danger);
  box-shadow: var(--sh-lg);
  transform: scale(1.03);
  padding: 24px;
  z-index: 10;
}

/* Expandable Content Shared Styles */
.stg-expand-btn {
  width: 100%; margin-top: 12px; background: transparent; border: 1px solid var(--border);
  color: var(--text-3); padding: 6px 10px; border-radius: var(--r-sm); font-size: 11.5px;
  cursor: pointer; transition: all 0.2s; font-weight: 700;
}
.stg-expand-btn:hover { background: var(--divider); color: var(--text); }
.stg-expand-btn::after { content: ' ▼'; font-size: 9px; opacity: 0.6; }
.stg-expanded .stg-expand-btn::after { content: ' ▲'; }

.stg-hidden-content { display: none; margin-top: 14px; border-top: 1px solid var(--divider); padding-top: 14px; }
.stg-expanded .stg-hidden-content { display: block; animation: fadeIn 0.3s ease; }

/* Header inside card */
.stg-header { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 12px; }
.stg-circle {
  width: 40px; height: 40px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; flex-shrink: 0; transition: all 0.2s;
}
.stg-archived .stg-circle { background: var(--success-50); color: var(--success); border: 2px solid var(--success); }
.stg-active .stg-circle   { background: var(--primary); color: #fff; box-shadow: 0 0 0 4px var(--primary-50); width: 46px; height: 46px; font-size: 20px; }
.stg-delayed .stg-circle  { background: var(--danger); color: #fff; box-shadow: 0 0 0 4px var(--danger-50); width: 46px; height: 46px; font-size: 20px; }
.stg-upcoming .stg-circle { background: #fff; color: var(--text-4); border: 2px solid var(--border); }

.stg-info { flex: 1; padding-top: 4px; }
.stg-title { font-size: 14px; font-weight: 800; color: var(--text); margin-bottom: 4px; display: flex; align-items: center; justify-content: space-between; gap: 8px;}
.stg-active .stg-title { font-size: 16px; color: var(--primary-dark); }
.stg-delayed .stg-title { font-size: 16px; color: var(--danger); }
.stg-date { font-size: 11px; color: var(--text-4); font-family: 'Inter'; }
.stg-meta-docs { font-size: 11px; margin-top: 4px; display: inline-block; padding: 2px 6px; background: var(--bg); border-radius: var(--r-sm); border: 1px solid var(--border); }


/* Threads within Active card */
.stg-threads { display: flex; flex-direction: column; gap: 14px; margin-top: 20px; overflow-y: auto; max-height: 480px; padding-right: 4px; }
.stg-thread-msg { display: flex; flex-direction: column; gap: 4px; max-width: 90%; }
.stg-thread-msg.right { align-self: flex-start; } /* Client (User) */
.stg-thread-msg.left { align-self: flex-end; }  /* Employee */

.stg-thread-bubble { padding: 12px 14px; border-radius: 12px; font-size: 13px; line-height: 1.5; color: var(--text); background: var(--bg); border: 1px solid var(--border); box-shadow: var(--sh-sm); }
.stg-thread-msg.right .stg-thread-bubble { background: var(--bg-card); border-bottom-right-radius: 2px; }
.stg-thread-msg.left .stg-thread-bubble { background: var(--primary-50); border: 1px solid var(--primary-100); color: var(--primary-dark); border-bottom-left-radius: 2px; }

.stg-thread-meta { display: flex; align-items: center; gap: 6px; font-size: 10.5px; color: var(--text-4); padding: 0 4px; }
.stg-thread-meta strong { color: var(--text-2); font-weight: 700; font-size: 11.5px; }

.stg-reply-area { margin-top: 16px; border-top: 1px solid var(--divider); padding-top: 16px; display: flex; gap: 8px; align-items: center; }
.stg-reply-input { flex: 1; border: 1px solid var(--border); border-radius: 20px; background: var(--bg); font-size: 13px; padding: 10px 16px; outline: none; transition: border-color 0.2s; font-family: inherit; }
.stg-reply-input:focus { border-color: var(--primary); background: #fff; }

/* Read-Only State for Archived */
.stg-archived-preview { margin-top: 12px; font-size: 12px; color: var(--text-3); background: var(--bg); padding: 10px; border-radius: var(--r-sm); }

/* Responsive break points */
@media(max-width: 1024px) {
  .layout-stages { grid-template-columns: 220px 1fr 220px; gap: 14px; }
}

@media(max-width: 768px) {
  .layout-stages {
    display: flex;
    overflow-x: auto;
    scroll-snap-type: x mandatory;
    gap: 16px;
    padding-bottom: 12px;
    margin: 10px -22px;
    padding-left: 22px; padding-right: 22px;
  }
  .layout-stages::-webkit-scrollbar { display: none; }
  .stg-card { min-width: 85vw; scroll-snap-align: center; margin-bottom: 0; }
  .stg-active { transform: none; min-width: 90vw; }
}

/* Request stage change */
.stage-request-bar {
  background:var(--warning-50); border:1px solid #FCD34D;
  border-radius:var(--r-sm); padding:10px 16px;
  display:flex; align-items:center; justify-content:space-between;
  margin-top:14px; gap:12px;
}

/* ════════════════════════════════════════
   DOCUMENTS
   ════════════════════════════════════════ */
.doc-alert {
  background:var(--danger-50); border:1px solid #FCA5A5;
  border-radius:var(--r-sm); padding:12px 16px;
  margin-bottom:14px; display:flex; align-items:center; gap:10px;
  font-size:13px;
}
.doc-alert-icon { font-size:18px; flex-shrink:0; }
.upload-zone {
  border:2px dashed var(--border); border-radius:var(--r);
  padding:28px 20px; text-align:center; cursor:pointer;
  transition:all var(--tr); margin-top:14px;
}
.upload-zone:hover { border-color:var(--primary); background:var(--primary-50); }
.upload-zone.dragover { border-color:var(--primary); background:var(--primary-50); }
.doc-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:12px; margin-top:14px; }
.doc-card { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--r-sm); padding:14px; display:flex; align-items:center; gap:12px; box-shadow:var(--sh-sm); transition:box-shadow var(--tr); }
.doc-card:hover { box-shadow:var(--sh-md); }
.doc-icon { width:40px; height:40px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:20px; flex-shrink:0; }
.doc-icon.pdf   { background:#FEF2F2; }
.doc-icon.dwg   { background:var(--primary-50); }
.doc-icon.img   { background:var(--teal-50); }
.doc-icon.doc   { background:#EFF6FF; }
.doc-info { flex:1; min-width:0; }
.doc-name { font-size:13px; font-weight:700; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.doc-meta { font-size:11px; color:var(--text-3); margin-top:2px; }
.doc-actions { display:flex; gap:4px; flex-shrink:0; }
.missing-doc-list { display:flex; flex-direction:column; gap:8px; }
.missing-doc-item { display:flex; align-items:center; justify-content:space-between; padding:10px 14px; background:var(--warning-50); border:1px solid #FCD34D; border-radius:var(--r-sm); font-size:13px; }

/* ════════════════════════════════════════
   PAYMENTS
   ════════════════════════════════════════ */
.payment-hero {
  display:grid; grid-template-columns:repeat(3,1fr); gap:14px; margin-bottom:20px;
}
.payment-hero-card { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--r); padding:18px; text-align:center; box-shadow:var(--sh-sm); }
.phc-icon { font-size:28px; margin-bottom:8px; }
.phc-amount { font-size:20px; font-weight:800; margin-bottom:4px; }
.phc-label  { font-size:12px; color:var(--text-3); }
.invoice-card { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--r-sm); padding:16px; margin-bottom:10px; box-shadow:var(--sh-sm); }
.inv-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
.inv-num { font-size:12px; color:var(--text-3); font-family:'Inter'; }
.inv-title { font-size:14px; font-weight:700; color:var(--text); }
.inv-body { display:flex; gap:20px; flex-wrap:wrap; font-size:12.5px; color:var(--text-3); }
.inv-body strong { color:var(--text); }
.inv-footer { display:flex; align-items:center; justify-content:space-between; margin-top:12px; border-top:1px solid var(--divider); padding-top:10px; }
.inv-total { font-size:16px; font-weight:800; color:var(--primary); }

/* ════════════════════════════════════════
   CONTRACTS & E-SIGNATURE
   ════════════════════════════════════════ */
.contract-card { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--r); box-shadow:var(--sh-sm); overflow:hidden; margin-bottom:16px; }
.contract-header { background:linear-gradient(135deg,var(--primary),#7C3AED); padding:18px 22px; color:#fff; }
.contract-title { font-size:16px; font-weight:800; margin-bottom:4px; }
.contract-meta  { font-size:12px; opacity:.8; }
.contract-body  { padding:20px 22px; }
.contract-clause { margin-bottom:12px; }
.contract-clause h4 { font-size:13px; font-weight:700; margin-bottom:4px; }
.contract-clause p  { font-size:12.5px; color:var(--text-3); line-height:1.6; }
.contract-sig-area { border-top:1px solid var(--divider); padding:20px 22px; }
.sig-box { border:2px dashed var(--border); border-radius:var(--r-sm); background:var(--bg); position:relative; }
.sig-canvas { display:block; width:100%; height:160px; cursor:crosshair; touch-action:none; }
.sig-placeholder { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; color:var(--text-4); font-size:13.5px; pointer-events:none; }
.sig-actions { display:flex; gap:8px; margin-top:10px; }

/* ════════════════════════════════════════
   MEETINGS
   ════════════════════════════════════════ */
.meeting-card { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--r); padding:18px; margin-bottom:12px; box-shadow:var(--sh-sm); display:flex; gap:16px; align-items:flex-start; }
.meet-time-block { text-align:center; min-width:64px; }
.meet-time { font-size:16px; font-weight:800; color:var(--primary); font-family:'Inter'; }
.meet-date { font-size:11px; color:var(--text-3); margin-top:2px; }
.meet-dot { width:10px; height:10px; border-radius:50%; margin:8px auto; flex-shrink:0; }
.meet-dot.upcoming { background:var(--primary); }
.meet-dot.live     { background:var(--danger); animation:pulse 1.2s infinite; }
.meet-dot.done     { background:var(--success); }
@keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(220,38,38,.4)} 50%{box-shadow:0 0 0 6px rgba(220,38,38,0)} }
.meet-info { flex:1; }
.meet-title { font-size:14px; font-weight:700; color:var(--text); margin-bottom:4px; }
.meet-meta  { font-size:12px; color:var(--text-3); display:flex; gap:12px; flex-wrap:wrap; }
.meet-actions { display:flex; gap:8px; flex-shrink:0; flex-wrap:wrap; }

/* Video area */
.video-container { position:relative; width:100%; background:#0F172A; border-radius:var(--r-lg); overflow:hidden; margin-top:14px; }
.video-container iframe { display:block; width:100%; height:480px; border:none; }
.video-controls { display:flex; align-items:center; gap:10px; padding:12px 16px; background:#1E293B; }
.vc-btn { width:40px; height:40px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:16px; transition:all .15s; flex-shrink:0; }
.vc-btn.danger { background:var(--danger); color:#fff; }
.vc-btn.muted  { background:#374151; color:#fff; }
.vc-btn.active { background:var(--primary); color:#fff; }
.recording-badge { display:flex; align-items:center; gap:6px; background:rgba(220,38,38,.15); border:1px solid rgba(220,38,38,.3); color:#FCA5A5; border-radius:20px; padding:4px 12px; font-size:12px; font-weight:600; margin-right:auto; }
.recording-dot { width:8px; height:8px; border-radius:50%; background:var(--danger); animation:pulse 1.2s infinite; }

/* ════════════════════════════════════════
   CHAT
   ════════════════════════════════════════ */
.chat-layout { display:grid; grid-template-columns:260px 1fr; gap:16px; height:calc(100vh - 160px); max-height:680px; }
@media(max-width:900px){ .chat-layout{grid-template-columns:1fr; height:auto;} }
.chat-sidebar { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--r); overflow:hidden; display:flex; flex-direction:column; }
.chat-sidebar-header { padding:14px 16px; border-bottom:1px solid var(--divider); font-weight:700; font-size:13.5px; }
.chat-list { flex:1; overflow-y:auto; }
.chat-item { display:flex; align-items:center; gap:10px; padding:10px 14px; cursor:pointer; transition:background var(--tr); border-bottom:1px solid var(--divider); }
.chat-item:hover { background:var(--bg); }
.chat-item.active { background:var(--primary-50); }
.chat-avatar { width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:14px; font-weight:700; color:#fff; flex-shrink:0; }
.chat-item-name { font-size:13px; font-weight:700; color:var(--text); }
.chat-item-last { font-size:11.5px; color:var(--text-3); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.chat-item-time { font-size:10.5px; color:var(--text-4); flex-shrink:0; font-family:'Inter'; }

.chat-main { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--r); display:flex; flex-direction:column; overflow:hidden; }
.chat-header { display:flex; align-items:center; gap:10px; padding:12px 16px; border-bottom:1px solid var(--divider); }
.chat-header-avatar { width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:15px; font-weight:700; color:#fff; flex-shrink:0; }
.chat-online { width:10px; height:10px; background:var(--success); border-radius:50%; flex-shrink:0; }
.chat-messages { flex:1; padding:16px; overflow-y:auto; display:flex; flex-direction:column; gap:12px; }
.msg { display:flex; gap:8px; max-width:80%; }
.msg.out { flex-direction:row-reverse; align-self:flex-start; }
.msg.in  { align-self:flex-end; }
.msg-avatar { width:30px; height:30px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; flex-shrink:0; align-self:flex-end; }
.msg-bubble { padding:10px 13px; border-radius:12px; font-size:13px; line-height:1.5; max-width:360px; }
.msg.in  .msg-bubble { background:var(--primary); color:#fff; border-radius:12px 0 12px 12px; }
.msg.out .msg-bubble { background:var(--bg); border:1px solid var(--border); color:var(--text); border-radius:0 12px 12px 12px; }
.msg.ai  .msg-bubble { background:linear-gradient(135deg,#7C3AED,var(--primary)); color:#fff; border-radius:12px 0 12px 12px; }
.msg-time { font-size:10.5px; color:var(--text-4); margin-top:3px; text-align:left; font-family:'Inter'; }
.msg.in  .msg-time { text-align:right; color:rgba(255,255,255,.6); }
.chat-input-area { padding:12px 16px; border-top:1px solid var(--divider); display:flex; gap:8px; align-items:flex-end; }
.chat-input { flex:1; border:1px solid var(--border); border-radius:20px; padding:9px 15px; font-size:13px; resize:none; outline:none; font-family:inherit; max-height:80px; transition:border-color var(--tr); }
.chat-input:focus { border-color:var(--primary); }
.chat-send { width:38px; height:38px; border-radius:50%; background:var(--primary); color:#fff; display:flex; align-items:center; justify-content:center; font-size:15px; flex-shrink:0; transition:background var(--tr); }
.chat-send:hover { background:var(--primary-dark); }

/* AI typing indicator */
.typing-dots { display:flex; align-items:center; gap:3px; padding:8px 4px; }
.typing-dot { width:7px; height:7px; border-radius:50%; background:rgba(255,255,255,.6); animation:typingBounce .8s infinite; }
.typing-dot:nth-child(2) { animation-delay:.15s; }
.typing-dot:nth-child(3) { animation-delay:.3s; }
@keyframes typingBounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-6px)} }

/* ════════════════════════════════════════
   NOTIFICATIONS
   ════════════════════════════════════════ */
.notif-item { display:flex; gap:12px; padding:14px 16px; border-bottom:1px solid var(--divider); cursor:pointer; transition:background var(--tr); }
.notif-item.unread { background:var(--primary-50); }
.notif-item:hover  { background:var(--bg); }
.notif-dot { width:8px; height:8px; border-radius:50%; background:var(--primary); flex-shrink:0; margin-top:6px; }
.notif-dot.read { background:transparent; }
.notif-icon-wrap { width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0; }
.notif-text { font-size:13px; color:var(--text); line-height:1.4; }
.notif-time { font-size:11px; color:var(--text-4); margin-top:3px; font-family:'Inter'; }

/* ════════════════════════════════════════
   RESPONSIVE
   ════════════════════════════════════════ */
@media(max-width:900px){
  .payment-hero { grid-template-columns:1fr; }
  .form-row { grid-template-columns:1fr; }
  .chat-layout { height:auto; max-height:none; }
}
</style>
</head>
<body>

<div class="app" id="app">

  <!-- ══ SIDEBAR ═══════════════════════════════════════ -->
  <aside class="sidebar" id="sidebar">

    <div class="sb-brand">
      <div class="sb-brand-icon">م</div>
      <div>
        <h1>معمار</h1>
        <span>مجموعة معمار للاستشارات الهندسية</span>
      </div>
    </div>

    <div class="sb-portal-tag">🔒 بوابة العملاء</div>

    <div class="sb-nav">
      <div class="nav-item active" data-page="dashboard">
        <span class="nav-icon">🏠</span><span>نظرة عامة</span>
      </div>

      <div class="sb-label" style="display:flex;justify-content:space-between;align-items:center;cursor:pointer;padding-bottom:10px" onclick="document.getElementById('sb-projects-list').classList.toggle('hidden')">
        <span>📂 مشاريعي</span>
        <span style="font-size:10px;opacity:0.6">▼</span>
      </div>
      <div id="sb-projects-list">
        <!-- dynamic projects will be injected here -->
      </div>

      <div class="sb-label">التواصل</div>
      <div class="nav-item" data-page="meetings">

        <span class="nav-badge" id="nb-meetings">1</span>

        <span class="nav-icon">💬</span><span>التواصل</span>
        <span class="nav-badge" id="nb-chat">3</span>
      </div>
      <div class="nav-item" data-page="requests">
        <span class="nav-icon">📩</span><span>الطلبات والتذاكر</span>
      </div>

        <span class="nav-icon">⚙️</span><span>الإعدادات</span>
      </div>

      <div class="sb-avatar" id="sb-avatar">•</div>

        <span id="sb-user-role">عميل</span>
      </div>
    </div>
  </aside>

  <!-- ══ MAIN ═══════════════════════════════════════════ -->
  <div class="main">

    <header class="topbar">
      <button class="topbar-toggle icon-btn" id="topbar-toggle">☰</button>
      <span class="topbar-page-title" id="page-title">نظرة عامة</span>
      <div class="topbar-actions">
        <span style="font-size:12px;color:var(--text-3); margin-right:8px" id="topbar-date"></span>
        <div style="position:relative">
          <button class="icon-btn" id="notif-btn" title="الإشعارات" onclick="document.getElementById('notif-dropdown').classList.toggle('hidden'); Portal.renderNotifications()">
            🔔<span class="notif-bubble"></span>
          </button>
          <div id="notif-dropdown" class="hidden" style="position:absolute; top:48px; left:0; width:340px; background:var(--bg-card); border-radius:12px; box-shadow:0 12px 48px rgba(0,0,0,0.15); border:1px solid var(--border); z-index:1000; max-height:480px; overflow-y:auto; overflow-x:hidden; text-align:right">
          </div>
        </div>
        <style>
          .user-menu { position:relative; display:inline-block; margin-right:8px; }
          .user-menu-btn { background:linear-gradient(135deg,var(--primary),var(--primary-dark)); color:#fff; border:none; padding:10px 22px; border-radius:10px; font-family:'Cairo',sans-serif; font-weight:800; font-size:14px; cursor:pointer; display:flex; align-items:center; gap:8px; white-space:nowrap; }
          .user-menu-content { display:none; position:absolute; top:calc(100% + 8px); left:0; background:#fff; border:1px solid var(--border); border-radius:10px; box-shadow:0 8px 24px rgba(0,0,0,0.1); min-width:180px; overflow:hidden; z-index:2000; text-align:right;}
          .user-menu:hover .user-menu-content, .user-menu-content.show { display:block !important; }
          .user-menu-content a, .user-menu-content button { display:block; width:100%; text-align:right; padding:12px 16px; color:var(--text); text-decoration:none; font-size:13px; font-weight:700; border:none; border-bottom:1px solid var(--divider); background:transparent; cursor:pointer; transition:all 0.2s; font-family:'Cairo',sans-serif;}
